[package]
name = "blacknode-skills"
version = "0.1.0"
description = "Reusable task-level robot skills composed from stable Blacknode capabilities."
requires-blacknode = ">=0.3.0"
layer = "skills"
component-mode = true

[components.pick-place]
description = "Capability-driven pick and place skill."
default = false
capabilities = ["skill.pick-place"]

[components.follow-person]
description = "Capability-driven person following skill."
default = false
capabilities = ["skill.follow-person"]

[components.follow-person.adapters.ros2]
description = "ROS 2 composition templates for target following and leader/follower operation."
default = false
capabilities = ["adapter.skill.follow-person.ros2"]
templates = ["components/follow-person/adapters/ros2/templates"]

[components.follow-person.adapters.ros2.dependencies]
requires = [
  { package = "blacknode-robot", component = "core", version = ">=0.2.0,<1.0.0" },
  { package = "blacknode-ros2", component = "core", version = ">=0.3.0,<1.0.0" },
]

[components.delivery]
description = "Package and item delivery mission skill."
default = false
capabilities = ["skill.delivery"]

[components.docking]
description = "Robot docking and charging skill."
default = false
capabilities = ["skill.docking"]

[components.inspection]
description = "Structured inspection mission skill."
default = false
capabilities = ["skill.inspection"]
